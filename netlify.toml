# Dispo Buddy — Netlify Configuration
# Domain: dispobuddy.com
# Deployed as a separate Netlify site from the same repo
# or from a split-out repo

[build]
  publish = "."
  functions = "netlify/functions"

# ── API Function Redirects ──
[[redirects]]
  from = "/api/dispo-buddy-submit"
  to = "/.netlify/functions/dispo-buddy-submit"
  status = 200

[[redirects]]
  from = "/api/partner-onboard"
  to = "/.netlify/functions/partner-onboard"
  status = 200

[[redirects]]
  from = "/api/buyer-demand"
  to = "/.netlify/functions/buyer-demand"
  status = 200

[[redirects]]
  from = "/api/affiliate-signup"
  to = "/.netlify/functions/affiliate-signup"
  status = 200

[[redirects]]
  from = "/api/affiliate-track"
  to = "/.netlify/functions/affiliate-track"
  status = 200

[[redirects]]
  from = "/api/affiliate-stats"
  to = "/.netlify/functions/affiliate-stats"
  status = 200

[[redirects]]
  from = "/sitemap.xml"
  to = "/.netlify/functions/sitemap"
  status = 200

# ── Clean URLs (no .html extensions) ──
[[redirects]]
  from = "/process"
  to = "/process.html"
  status = 200

[[redirects]]
  from = "/what-we-look-for"
  to = "/what-we-look-for.html"
  status = 200

[[redirects]]
  from = "/submit-deal"
  to = "/submit-deal.html"
  status = 200

[[redirects]]
  from = "/join"
  to = "/join.html"
  status = 200

[[redirects]]
  from = "/proof"
  to = "/proof.html"
  status = 200

[[redirects]]
  from = "/faq"
  to = "/faq.html"
  status = 200

[[redirects]]
  from = "/contact"
  to = "/contact.html"
  status = 200

[[redirects]]
  from = "/buyers-map"
  to = "/buyers-map.html"
  status = 200

[[redirects]]
  from = "/affiliates"
  to = "/affiliates.html"
  status = 200

[[redirects]]
  from = "/affiliate-dashboard"
  to = "/affiliate-dashboard.html"
  status = 200

[[redirects]]
  from = "/affiliate-terms"
  to = "/affiliate-terms.html"
  status = 200

# ── SOP viewer (force = true so the 404 catch-all doesn't win) ──
[[redirects]]
  from = "/sops"
  to = "/sops/index.html"
  status = 200
  force = true

[[redirects]]
  from = "/sops/"
  to = "/sops/index.html"
  status = 200
  force = true

[[redirects]]
  from = "/sops/index"
  to = "/sops/index.html"
  status = 200
  force = true

# ── 404 fallback ──
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404

# ── Security Headers ──
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# ── SOPs — no-index, serve .md as text ──
[[headers]]
  for = "/sops/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/sops/*.md"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"
    X-Robots-Tag = "noindex, nofollow"

# ── Cache static assets ──
[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
